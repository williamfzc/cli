name: Issue Labels

env:
  # Opt into Node.js 24 runtime for JavaScript actions.
  # See: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: '0 * * * *' # every hour
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Do not write labels, only print planned changes"
        required: false
        default: true
        type: boolean
      lookback_hours:
        description: "Only scan issues updated in the last N hours"
        required: false
        default: "6"
        type: string

permissions:
  contents: read
  issues: write

concurrency:
  group: issue-labels
  cancel-in-progress: true

jobs:
  sync-issue-labels:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Sync managed issue labels
        id: sync_issue_labels
        # Labeling is best-effort and must not block other workflows.
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          lookback="6"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.lookback_hours }}" ]; then
            lookback="${{ github.event.inputs.lookback_hours }}"
          fi

          args=(
            "--lookback-hours" "$lookback"
            "--max-issues" "300"
          )

          # Schedule runs should write labels by default.
          # Manual runs default to dry-run unless explicitly disabled.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.dry_run || 'true' }}" = "true" ]; then
            args+=("--dry-run" "--json")
          fi

          node scripts/issue-labels/index.js "${args[@]}"

      - name: Warn when label sync fails
        if: ${{ always() && steps.sync_issue_labels.outcome == 'failure' }}
        run: |
          echo "::warning::Issue label sync failed; labels may be stale."
          echo "⚠️ Issue label sync failed; labels may be stale." >> "$GITHUB_STEP_SUMMARY"
