name: PR Labels

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read
  pull-requests: read
  # PR labels are managed through the issues API.
  issues: write

jobs:
  sync-pr-labels:
    if: ${{ github.event.pull_request.state == 'open' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642e03cb748f7d9d40d8f46 # v4
        with:
          node-version: '20'

      - name: Sync managed PR labels
        # Labeling is best-effort and must not block PR merges.
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/sync-pr-labels/index.js
